<!DOCTYPE html>
<html>
<body style="display:flex;height:100vh;margin:0">
<iframe id="viewer" src="galbot_g1.html" style="flex:1;border:none"></iframe>
<div id="panel" style="width:300px;overflow-y:auto;padding:8px"></div>
</body>
<script>
const joints = [
    "leg_joint1","leg_joint2","leg_joint3","leg_joint4","leg_joint5",
    "head_joint1","head_joint2",
    "left_arm_joint1","left_arm_joint2","left_arm_joint3","left_arm_joint4","left_arm_joint5","left_arm_joint6","left_arm_joint7",
    "right_arm_joint1","right_arm_joint2","right_arm_joint3","right_arm_joint4","right_arm_joint5","right_arm_joint6","right_arm_joint7"
];
const viewer = document.getElementById("viewer");
const panel = document.getElementById("panel");
joints.forEach(name => {
    const div = document.createElement("div");
    div.style.marginBottom = "4px";
    const label = document.createElement("span");
    label.textContent = name;
    label.style.display = "inline-block";
    label.style.width = "140px";
    const input = document.createElement("input");
    input.type = "number";
    input.step = "0.01";
    input.value = "0";
    input.style.width = "80px";
    input.onchange = () => {
        viewer.contentWindow.postMessage({ type: "setJoints", joints: { [name]: parseFloat(input.value) } }, "*");
    };
    div.appendChild(label);
    div.appendChild(input);
    panel.appendChild(div);
});
</script>
</html>
