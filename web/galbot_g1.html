<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galbot G1 URDF Viewer</title>
<style>
body { margin: 0; overflow: hidden; }
</style>
</head>
<body>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.184.0/build/three.module.js",
"three/": "https://unpkg.com/three@0.184.0/",
"three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.184.0/examples/jsm/loaders/GLTFLoader.js",
"three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.184.0/examples/jsm/controls/OrbitControls.js",
"urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.12.7/src/URDFLoader.js"
}
}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader";
import URDFLoader from "urdf-loader";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xa0a0a0);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(1, 1, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.update();

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.setScalar(1024);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight2.position.set(-5, 5, -5);
scene.add(dirLight2);

const grid = new THREE.GridHelper(10, 10, 0x000000, 0x000000);
grid.material.opacity = 0.2;
grid.material.transparent = true;
scene.add(grid);

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 30),
    new THREE.ShadowMaterial({ opacity: 0.25 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// World setup - 处理坐标系转换
// URDF模型通常Z轴朝上，Three.js默认Y轴朝上
const world = new THREE.Object3D();
scene.add(world);

function setUp(up) {
    if (!up) up = '+Z';
    up = up.toUpperCase();
    const sign = up.replace(/[^-+]/g, '')[0] || '+';
    const axis = up.replace(/[^XYZ]/gi, '')[0] || 'Z';
    const PI = Math.PI;
    const HALFPI = PI / 2;
    if (axis === 'X') world.rotation.set(0, 0, sign === '+' ? HALFPI : -HALFPI);
    if (axis === 'Z') world.rotation.set(sign === '+' ? -HALFPI : HALFPI, 0, 0);
    if (axis === 'Y') world.rotation.set(sign === '+' ? 0 : PI, 0, 0);
}

// 设置up方向为+Z（URDF标准）
setUp('+Z');

const manager = new THREE.LoadingManager();
const loader = new URDFLoader(manager);
loader.packages = {
    "galbot_one_golf_description": "../"
};

loader.loadMeshCb = function(path, manager, onComplete) {
    const gltfLoader = new GLTFLoader(manager);
    gltfLoader.load(path,
        result => onComplete(result.scene),
        undefined,
        err => {
            console.error("Mesh load failed:", path, err);
            onComplete(null, err);
        }
    );
};

let robot = null;

// 全局关节角度存储，父窗口可通过 window.joint_values 预设
window.joint_values = {};

// 应用joint_values中的值到robot
function applyJointValues() {
    for (const [name, value] of Object.entries(window.joint_values)) {
        const joint = robot.joints[name];
        if (joint) {
            joint.setJointValue(value);
        }
    }
}

loader.load(
    "../urdf/galbot_one_golf.urdf",
    loadedRobot => {
        robot = loadedRobot;
        robot.traverse(c => {
            if (c.isMesh) {
                c.castShadow = true;
            }
        });
        world.add(robot);

        // 机器人加载后立即应用已存储的关节角度
        applyJointValues();

        console.log("Robot loaded:", robot);

        const box = new THREE.Box3().setFromObject(robot);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        // 如果包围盒为空，保持默认相机位置
        if (maxDim === 0) {
            console.warn("Robot bounding box is empty! Meshes may not have loaded correctly.");
        } else {
            controls.target.copy(center);
            camera.position.set(center.x + maxDim * 1.5, center.y + maxDim * 0.8, center.z + maxDim * 1.5);
            controls.update();
        }
    },
    undefined,
    err => console.error("URDF load failed:", err)
);

// 监听来自父窗口的postMessage，设置关节角度
window.addEventListener("message", (event) => {
    const data = event.data;
    if (data && data.type === "setJoints") {
        const joints = data.joints;
        // 先存到全局变量
        for (const [name, value] of Object.entries(joints)) {
            window.joint_values[name] = value;
        }
        // 如果robot已加载，立即应用
        if (robot) {
            applyJointValues();
        }
    }
});

window.addEventListener("resize", () => {
    console.log("Window resized to:", window.innerWidth, "x", window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
